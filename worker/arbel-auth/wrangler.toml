name = "arbel-auth"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
# Non-secret env vars (none needed at the moment)

# ─── Required secrets ────────────────────────────────────────────
# wrangler secret put GITHUB_CLIENT_ID
# wrangler secret put GITHUB_CLIENT_SECRET
# wrangler secret put ANALYTICS_SALT        # long random string — salts visitor hashes
#
# ─── Cloudflare Access (admin panel gating) ──────────────────────
# wrangler secret put CF_ACCESS_TEAM_DOMAIN # e.g. "arbel" (the subdomain part)
# wrangler secret put CF_ACCESS_AUD         # application audience tag from Zero Trust UI
#
# ─── Analytics KV namespace ──────────────────────────────────────
# Create once:
#   npx wrangler kv namespace create ANALYTICS
# Then paste the returned id below and uncomment this block.
# [[kv_namespaces]]
# binding = "ANALYTICS"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"

